<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RUPHY CORE - AI ENGINE</title>
    <style>
        /* CSS Critique : 0ms de temps de rendu */
        :root { --n: #00ff41; --b: #000; }
        body { background: var(--b); color: var(--n); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; height: 100vh; }
        #terminal { flex: 1; padding: 20px; overflow-y: auto; scroll-behavior: smooth; border-right: 1px solid #111; }
        #monitor { width: 300px; padding: 20px; background: #050505; font-size: 0.7rem; color: #008822; }
        .input-line { display: flex; gap: 10px; margin-top: 10px; }
        input { background: transparent; border: none; color: var(--n); outline: none; flex: 1; font-family: inherit; font-size: 1.2rem; }
        .log { margin-bottom: 5px; opacity: 0.8; }
        .res { color: #fff; font-weight: bold; margin-bottom: 15px; border-left: 2px solid var(--n); padding-left: 10px; }
        .pro-label { background: var(--n); color: #000; padding: 2px 5px; font-weight: bold; font-size: 0.6rem; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="history">
        <div class="log">RUPHY CORE v2.4.3 - OPTIMIZED FOR LOW ENERGY</div>
        <div class="log">System: Ready. Memory Usage: 0.02%</div>
    </div>
    <div class="input-line">
        <span>&gt;</span>
        <input type="text" id="cmd" autofocus placeholder="Entrez un système ou un calcul..." onkeypress="handle(event)">
    </div>
</div>

<div id="monitor">
    <div class="pro-label">PROCESSOR ANALYTICS</div>
    <p id="stats">CPU: IDLE<br>RAM: 0MB CACHED<br>NET: STABLE</p>
</div>

<script>
    const hist = document.getElementById('history');
    const stats = document.getElementById('stats');

    async function handle(e) {
        if (e.key === 'Enter') {
            const val = e.target.value;
            e.target.value = '';
            
            // Affichage immédiat (Zéro latence)
            hist.innerHTML += `<div class="log">> ${val}</div>`;
            
            // Simulation de calcul haute performance (à lier à ton tunnel)
            stats.innerHTML = "CPU: BUSY<br>RAM: 4KB<br>NET: SENDING";
            
            try {
                // Ici, Ruphy calcule sans stocker de gros objets
                const res = eval(val.replace('^', '**')); 
                hist.innerHTML += `<div class="res">RUPHY_RESULT: ${res}</div>`;
            } catch {
                hist.innerHTML += `<div class="res" style="color:red">ERROR: INVALID_SYNTAX</div>`;
            }
            
            hist.parentElement.scrollTop = hist.parentElement.scrollHeight;
            stats.innerHTML = "CPU: IDLE<br>RAM: 0MB CACHED<br>NET: WAITING";
        }
    }
    // Filtre de sécurité : seuls les chiffres et les opérateurs mathématiques passent
const secureVal = val.replace(/[^0-9+\-*/().^e\s]/g, ''); 
if (secureVal !== val) {
    hist.innerHTML += `<div class="res" style="color:orange">RUPHY_SECURITY: Commande bloquée (caractères non autorisés)</div>`;
} else {
    const res = eval(secureVal.replace('^', '**'));
    hist.innerHTML += `<div class="res">RUPHY_RESULT: ${res}</div>`;
}

</script>
</body>
</html>
