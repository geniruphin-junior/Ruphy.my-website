<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Système d'Accès au site</title>
    <style>
        :root { --primary: #00d2ff; --bg: #060b23; --card: #101935; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .login-card { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        h2 { margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; color: var(--primary); }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; opacity: 0.7; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #232d4b; background: #0a0f24; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }
        
        #user-profile { display: none; text-align: center; }
        .avatar { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>

<!-- Formulaire de Connexion -->
<div class="login-card" id="login-form">
    <h2>Connexion Ruphy</h2>
    <div class="input-group">
        <label>Nom d'utilisateur</label>
        <input type="text" id="username" placeholder="Ex: Ruphin">
    </div>
    <div class="input-group">
        <label>Mot de passe (Simulé)</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    <div class="input-group">
        <label>Adresse mail</label>
        <input type="text" id="mail" placeholder="rupysite235@gmail.com">
    </div>
    <button class="btn" onclick="handleLogin()">Accéder au Système</button>
</div>

<!-- Profil une fois connecté -->
<div class="login-card" id="user-profile">
    <div class="avatar" id="avatar-letter">?</div>
    <h2 id="welcome-msg">Bienvenue sur le site Ruphy</h2>
    <p style="opacity: 0.6;">Statut : Authentifié </p>
    <button class="btn" style="background: #ef4444;" onclick="handleLogout()">Se Déconnecter</button>
</div>

<script>
    // 1. Vérifier au démarrage si l'utilisateur est déjà connu (LocalStorage)
    window.onload = function() {
        const savedUser = localStorage.getItem('loggedUser');
        if (savedUser) {
            showProfile(savedUser);
        }
    };

    // 2. Fonction de Connexion
    function handleLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const mail=document.getElementById('mail')

        if (user.length > 2) {
            localStorage.setItem('loggedUser', user); // Sauvegarde locale
            showProfile(user);
            speak("Connexion réussie. Bienvenue " + user);
        } else {
            alert("Veuillez entrer un nom valide (min 3 caractères).");
        }
        if('@gmail.com'in mail){
            alert('adresse mail correcte')
        } else {
            speak('veuiller mettre une adresse mail correct')
        }


    }


    // 3. Affichage du profil
    function showProfile(username) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('user-profile').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "Salut, " + username;
        document.getElementById('avatar-letter').innerText = username.charAt(0).toUpperCase();
    }

    // 4. Déconnexion
    function handleLogout() {
        localStorage.removeItem('loggedUser'); // Efface la mémoire
        location.reload(); // Recharge la page
    }

    // 5. Petite touche IA (Voix)
    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'fr-FR';
        window.speechSynthesis.speak(msg);
    }
    window.onload=function() {
        if (localStorage.getItem("ruphy_session"))
    {
        window.location.href="index.html";
    }
    };
</script>

</body>
</html>
