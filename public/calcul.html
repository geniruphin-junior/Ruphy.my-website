<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculatrice pro</title>
  </head>
  <body>
    <div>
      <h2>calculatrice futuriste</h2>
      <input  type="number" id="input" placeholder="0" />
      <button class="btn">0</button>
      <button class="btn">1</button>
      <button class="btn">2</button>
      <button class="btn">3</button>
      <button class="btn">4</button>
      <button class="btn">5</button>
      <button class="btn">6</button>
      <button class="btn">7</button>
      <button class="btn">8</button>
      <button class="btn">9</button>
      <button class="btn-func">-</button>
      <button class="btn-func">+</button>
      <button class="btn-func">/</button>
      <button class="btn-func">x</button>
    </div>

    <script>
      const input = document.querySelector("#input");
      input.style.borderRadius = "10px";
      input.style.background = "#000040";
      input.style.width = "100%";
      input.style.border = "none";
      input.style.marginBottom = "20px";
      input.style.padding = "12px 24px";
      input.style.textAlign = "right";
      input.style.color = "#ffffff";
      const btn = document.querySelectorAll("button");
      btn.style.color="white";
      padding = "15px";
      btn.style.background = "rgba(255, 255, 255, 0.05)";
    </script>
  </body>
</html>
